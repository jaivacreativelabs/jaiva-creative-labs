kind = "web"
previewPath = "/"
title = "JAIVA Creative Labs"
version = "1.0.0"
id = "artifacts/jaiva-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23107

[services.development]
run = "pnpm --filter @workspace/jaiva-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jaiva-website", "run", "build" ]
publicDir = "artifacts/jaiva-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23107"
BASE_PATH = "/"
